<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>sowers サークル｜予約・出欠</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=M+PLUS+Rounded+1C:wght@400;500;700;800;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap');
*{box-sizing:border-box}
:root{--bg:#ffffff;--card:#ffffff;--ink:#111111;--muted:#666666;--line:#EAEAEA;--main:#10A37F;--main-soft:#E7F5F0;--accent:#FF9F1C;--accent-soft:#FFF3E0;--warn:#FF5A5F;--warn-soft:#FFEBEC;--green:#10A37F;--orange:#FF9F1C;--pink:#10A37F;--red:#FF5A5F;--blue:#10A37F;--grad:#10A37F}
@media (prefers-color-scheme: dark){:root{--bg:#0f0f0f;--card:#171717;--ink:#f5f5f5;--muted:#9a9a9a;--line:#262626;--main-soft:#10241f;--accent-soft:#2a2113;--warn-soft:#2a1718}}
body{margin:0;font-family:'Geist','M PLUS Rounded 1C',-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Geist','M PLUS Rounded 1C','Hiragino Sans','Yu Gothic',sans-serif;margin:0;font-weight:700;letter-spacing:.2px}
button,input,select,textarea{font-family:inherit}
p{margin:6px 0}
.muted{color:var(--muted)}.small{font-size:12px}.center{text-align:center}
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:16px 18px calc(14px + env(safe-area-inset-top))}
header h1{font-size:23px;font-weight:600;color:var(--ink);font-family:'Clash Display','Geist',sans-serif;letter-spacing:.3px}
header .sub{font-size:12px;color:var(--muted);margin-top:3px}
main{padding:20px 16px calc(110px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px;margin:16px 0;animation:fade .22s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2{font-size:17px;font-weight:700;margin-bottom:10px}
h3{font-size:13px;font-weight:700;color:var(--muted);margin:18px 0 8px}
.between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button{appearance:none;border:0;border-radius:18px;padding:14px 16px;font-weight:700;font-size:15px;background:var(--main);color:#fff;cursor:pointer;transition:transform .12s ease,opacity .2s}
button:active{transform:scale(.97)}
button.big{width:100%;min-height:52px;font-size:16px}
button.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line)}
button.ghost{background:transparent;color:var(--main);border:0;padding:12px;width:100%}
button.orange{background:var(--accent)}
button.pink{background:var(--main)}
button.red{background:var(--warn)}
button:disabled{opacity:.4}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px;font-size:16px;background:var(--card);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--main)}
label{font-size:12px;color:var(--muted);font-weight:600}
.field{margin:14px 0}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 12px;background:var(--main-soft);color:var(--main);font-size:12px;font-weight:700}
.pill.danger{background:var(--warn-soft);color:var(--warn)}
.pill.warn{background:var(--accent-soft);color:#b46a00}
.pill.blue{background:var(--main-soft);color:var(--main)}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{position:relative;min-height:56px;border:1px solid var(--line);border-radius:14px;background:var(--card);font-size:13px;font-weight:600;color:var(--ink);padding:4px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .12s}
.day:active{transform:scale(.96)}
.day .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:3px}
.dayemo{font-size:13px;line-height:1.1;letter-spacing:0;max-width:100%;display:flex;flex-wrap:wrap;justify-content:center;gap:1px}
.day.has{border-color:var(--main)}
.day.selected{border-color:var(--main);box-shadow:inset 0 0 0 1px var(--main)}
.day.picked{background:var(--main);border-color:var(--main);color:#fff}
.day.picked b,.day.picked .dot{color:#fff;background:#fff}
.calendar i{display:block}
.people{display:grid;gap:10px;margin-top:12px}
.prow{display:flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:var(--card);flex-wrap:wrap}
.prow.big{font-size:16px}
.prow.plain{border:0;padding:6px 2px;background:transparent}
.ringMini{position:relative;width:40px;height:40px;border-radius:50%;padding:2px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:6px;background:var(--card);overflow:visible;flex:0 0 auto}
.ringMini .inner{width:100%;height:100%;border-radius:50%;background:var(--main-soft);display:inline-flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.ringMini .inner img{width:100%;height:100%;object-fit:cover}
.ring-white{border:2px solid var(--line)}
.ring-blue{border:2px solid #3b82f6}.ring-green{border:2px solid #10A37F}.ring-red{border:2px solid var(--warn)}
.ring-gold{border:2px solid var(--accent)}.ring-purple{border:2px solid #8b5cf6}.ring-black{border:2px solid var(--ink)}
.bday-hat{position:absolute;top:-12px;left:-4px;width:20px;height:20px;transform:rotate(-18deg);pointer-events:none;z-index:3}
.beginner-mark{position:absolute;bottom:-7px;right:-7px;font-size:14px;line-height:1;pointer-events:none;z-index:3}
.emoji-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--card);overflow:hidden;margin:0 6px 0 2px;vertical-align:middle;font-size:14px}
.emoji-badge .emoimg{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.p-name{font-weight:700;vertical-align:middle}
.role-tag{margin-left:4px;color:var(--muted);font-size:12px}
.actions{margin-top:14px}
.subtabs{display:flex;gap:8px;margin:2px 0 12px}
.subtabs button{flex:1;background:var(--card);color:var(--muted);border:1px solid var(--line);min-height:46px}
.subtabs button.on{background:var(--main-soft);color:var(--main);border-color:var(--main)}
.seg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.seg button{background:var(--card);color:var(--ink);border:1px solid var(--line);display:flex;flex-direction:column;gap:2px;min-height:56px}
.seg button small{color:var(--muted);font-weight:500;font-size:11px}
.seg button.on{background:var(--main-soft);border-color:var(--main);color:var(--main)}
.seg button.on small{color:var(--main)}
.emojipick{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.emo{width:54px;height:54px;border-radius:16px;background:var(--card);border:1px solid var(--line);padding:0;overflow:hidden}
.emo img{width:100%;height:100%;object-fit:cover;display:block}
.emo.sel{border:2px solid var(--main)}
.filebtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:52px;border-radius:18px;background:var(--main);color:#fff;font-weight:700;cursor:pointer}
.ticket{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:var(--card)}
.ticket.used{opacity:.5}
.ticket b{flex:1}
.places{display:grid;gap:10px}
.placerow{display:flex;gap:8px;align-items:center}
.placerow>input{padding:12px;flex:1;min-width:0}
.placerow .amt{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.placerow .amt input{width:80px;text-align:right;padding:12px 8px}
.placerow .amt span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.placerow .del{background:var(--card);color:var(--warn);border:1px solid var(--line);width:44px;padding:0;min-height:44px;font-size:18px}
.placerow.add>input{border-style:dashed}
.amt{display:flex;align-items:center;gap:8px}
.amt>input{max-width:160px;text-align:right}
.amt>span{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.erow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.erow:last-child{border-bottom:0}
.eright{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.atlist{display:grid;gap:10px;margin-top:12px}
.atrow{display:flex;align-items:center;gap:10px;text-align:left;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:16px;padding:12px;min-height:56px;font-weight:600;flex-wrap:wrap}
.atrow .check{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex:0 0 auto;background:var(--card)}
.atrow.on{border-color:var(--main);background:var(--main-soft)}
.atrow.on .check{background:var(--main);border-color:var(--main)}
.sline{background:var(--main-soft);border:0;border-radius:16px;padding:14px;margin-top:8px}
.money{font-size:19px;font-weight:800;color:var(--main)}
.bar{height:10px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:8px}
.bar>span{display:block;height:100%;background:var(--main)}
.bstat{margin:14px 0}
.legend{display:grid;gap:10px}
.legend>div{display:flex;align-items:center;gap:10px}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:space-around;gap:2px;background:var(--bg);border-top:1px solid var(--line);padding:10px 8px calc(10px + env(safe-area-inset-bottom))}
.navbtn{flex:1;background:transparent;color:var(--muted);border:0;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;border-radius:12px}
.navbtn .ic{font-size:24px;line-height:1}
.navbtn.active{color:var(--main)}
.material-symbols-rounded{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;line-height:1;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.rolebadge{background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-weight:700;font-size:12px;white-space:nowrap}
.rolebadge.r-admin{color:var(--ink);border-color:var(--ink)}
.rolebadge.r-staff{color:#8b5cf6;border-color:#8b5cf6}
.rolebadge.r-participant{color:var(--main);border-color:var(--main)}
.toast{position:fixed;left:16px;right:16px;bottom:96px;background:var(--ink);color:var(--bg);padding:14px;border-radius:16px;z-index:50;text-align:center;font-weight:600;display:none}
.toast.show{display:block;animation:fade .2s ease both}
.sheet{border:1px solid var(--main)}
</style>
</head>

<main id="view"></main>
<nav id="nav" class="nav"></nav>

/* ===== economics ===== */
function hoursOf(t){const m=(t||'').match(/(\d{1,2}):(\d{2})\D+(\d{1,2}):(\d{2})/);if(!m)return 2;let a=+m[1]+(+m[2])/60,b=+m[3]+(+m[4])/60,h=b-a;if(h<=0)h+=24;return Math.round(h*10)/10}
function placePerHour(name){const p=(state.settings.places||[]).find(x=>x.name===name);return p?(+p.perHour||0):0}
function econ(e){const hrs=hoursOf(e.time);const venue=e.venueCost!=null?e.venueCost:placePerHour(e.place)*hrs;const labor=e.laborCost!=null?e.laborCost:(+state.settings.laborPerHour||0)*hrs;const fee=e.fee!=null?e.fee:(+state.settings.fee||0);const cost=venue+labor;const line=Math.ceil(cost/Math.max(fee,1));const balance=e.bookings.length*fee-cost;return{hrs,venue,labor,fee,cost,line,balance}}

/* ===== people / rings ===== */
function userByPhone(phone){return state.users.find(u=>u.phone===phone)||{}}
function currentUser(){return state.users.find(u=>u.id===currentUserId)}
function roleOf(p){const u=userByPhone(p.phone)||p;return u.role||p.role||'participant'}
function votePoints(phone){return (state.votes||[]).filter(v=>v.targetPhone===phone).length}
function nextRingInfo(points){if(points<21)return{next:'ブルー',remain:21-points};if(points<51)return{next:'グリーン',remain:51-points};if(points<76)return{next:'レッド',remain:76-points};if(points<101)return{next:'ゴールド',remain:101-points};return{next:'最高',remain:0}}
function ringClassFor(p){const r=roleOf(p);if(r==='admin')return 'ring-black';if(r==='staff')return 'ring-purple';const pts=votePoints(p.phone);if(pts>=101)return 'ring-gold';if(pts>=76)return 'ring-red';if(pts>=51)return 'ring-green';if(pts>=21)return 'ring-blue';return 'ring-white'}
function personIcon(p){const u=userByPhone(p.phone);if(!u.id)return '👶';const r=roleOf(p);if(r==='admin'||r==='staff')return ICONS.sprout?`<img class="emoimg" src="${ICONS.sprout}" alt="">`:'🌱';const key=u.icon||p.icon;const src=ICONS[key]||ICONS.a1;return `<img class="emoimg" src="${src}" alt="">`}
function roleLabel(p){const r=roleOf(p);return r==='admin'?'管理者':r==='staff'?'スタッフ':'参加者'}
function isBirthday(p){const u=userByPhone(p.phone)||{};return !!u.birth && Number(u.birth.slice(5,7))===new Date().getMonth()+1}
function birthdayHat(p){if(!isBirthday(p))return '';return `<svg class="bday-hat" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><polygon points="14,2.5 6,23 22,23" fill="#D6188C"/><polygon points="14,2.5 6,23 14,23" fill="#fff" opacity="0.18"/><circle cx="10.5" cy="17.5" r="1.4" fill="#fff"/><circle cx="14.6" cy="12.5" r="1.4" fill="#fff"/><circle cx="12.6" cy="21" r="1.3" fill="#fff"/><circle cx="14" cy="3" r="2.7" fill="#71C846"/></svg>`}
function avatarInner(p){const u=userByPhone(p.phone)||{};if(!u.id)return '👶';const img=u.image||p.image||'';if(img)return `<img src="${img}" alt="">`;const r=roleOf(p);if(r==='admin'||r==='staff')return `<img src="${ICONS.sprout}" alt="">`;return '👤'}
function attendCount(phone){return (state.events||[]).filter(e=>(e.attendedPhones||[]).includes(phone)).length}
function isFirstTimer(p){const r=roleOf(p);if(r==='admin'||r==='staff')return false;return attendCount(p.phone)===0}
function beginnerMark(p){return isFirstTimer(p)?'<span class="beginner-mark">🔰</span>':''}
function personRow(p){return `<span class="ringMini ${ringClassFor(p)}"><span class="inner">${avatarInner(p)}</span>${birthdayHat(p)}${beginnerMark(p)}</span><span class="emoji-badge">${personIcon(p)}</span><span class="p-name">${p.nick||userByPhone(p.phone).nick||p.phone}</span> <span class="role-tag">${roleLabel(p)}</span>`}

/* ===== calendar ===== */
function monthDays(){const now=new Date();const y=now.getFullYear(),m=now.getMonth();const first=new Date(y,m,1);const days=new Date(y,m+1,0).getDate();let arr=[];for(let i=0;i<first.getDay();i++)arr.push(null);for(let day=1;day<=days;day++)arr.push(new Date(y,m,day).toISOString().slice(0,10));return arr}
function byDate(d){return state.events.filter(e=>e.date===d)}

/* ===== navigation ===== */
function tabsFor(role){const t=[{id:'reserve',label:'予約',icon:'calendar_today'},{id:'mypage',label:'マイページ',icon:'account_circle'}];if(role==='staff'||role==='admin')t.push({id:'staff',label:'スタッフ',icon:'campaign'});if(role==='admin'){t.push({id:'admin',label:'管理',icon:'tune'});t.push({id:'analytics',label:'分析',icon:'monitoring'})}return t}
function renderNav(){const role=roleOf(currentUser());const tabs=tabsFor(role);if(!tabs.find(t=>t.id===currentTab))currentTab='reserve';return tabs.map(t=>`<button class="navbtn ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')"><span class="ic material-symbols-rounded">${t.icon}</span><span>${t.label}</span></button>`).join('')}
function switchTab(id){const allowed=tabsFor(roleOf(currentUser())).map(t=>t.id);if(!allowed.includes(id))id='reserve';currentTab=id;render()}
function roleIcon(role){return role==='admin'?'⚫':role==='staff'?'🟣':'🟢'}
function denied(){return '<div class="card center muted">この画面は表示できません（権限がありません）。下のタブからご利用ください。</div>'}

/* ===== reserve ===== */
function pickDate(d){selectedDate=d;render()}
function calendarPick(sel,fn){return `<div class="calendar">${monthDays().map(d=>{if(!d)return '<i></i>';const evs=byDate(d);const emo=evs.map(e=>sportEmoji(e.sport)).join('');return `<button class="day ${evs.length?'has':''} ${d===sel?'selected':''}" onclick="${fn}('${d}')"><b>${Number(d.slice(8))}</b>${emo?`<span class="dayemo">${emo}</span>`:''}</button>`}).join('')}</div>`}
function renderReserve(){const evs=byDate(selectedDate);return `
  <div class="card"><h2>予約カレンダー</h2><p class="muted small">日付をタップ。色付きの日にイベントがあります。</p>${calendarPick(selectedDate,'pickDate')}</div>
  <div class="muted small center">${fmtDate(selectedDate)} のイベント</div>
  ${evs.length?evs.map(reserveCard).join(''):'<div class="card muted center">この日はイベントがありません</div>'}
  ${evs.map(surveyCard).join('')}`}
function reserveCard(e){const me=currentUser();const booked=e.bookings.some(b=>b.userId===me.id);const full=e.bookings.length>=e.capacity;const fr=state.friends.filter(f=>f.ownerId===me.id);
  return `<div class="card"><div class="between"><h2>${sportEmoji(e.sport)} ${e.sport}</h2><span class="pill">${e.bookings.length}/${e.capacity}</span></div>
    <div class="muted">${e.time}<br>${e.place}</div>
    <div class="people">${e.bookings.map(p=>`<div class="prow">${personRow(p)}</div>`).join('')||'<div class="muted small">まだ参加者がいません</div>'}</div>
    <div class="actions">${booked?`<button class="red big" onclick="cancelBook('${e.id}')">予約をキャンセル</button>`:full?`<button class="orange big" onclick="waitBook('${e.id}')">キャンセル待ちに入る</button>`:`<button class="big" onclick="quickBook('${e.id}')">ワンタップで予約</button>`}</div>
    ${(!full&&fr.length)?`<button class="ghost" onclick="openFriend('${e.id}')">＋ 友達も連れて行く</button>`:''}
    ${e.waitlist&&e.waitlist.length?`<p class="muted small">キャンセル待ち：${e.waitlist.map(w=>w.nick).join('、')}</p>`:''}</div>`}
function quickBook(eid){const e=ev(eid);const me=currentUser();if(e.bookings.some(b=>b.phone===me.phone))return showToast('予約済みです');if(e.bookings.length>=e.capacity)return showToast('満員です');e.bookings.push({phone:me.phone,nick:me.nick,icon:me.icon,userId:me.id});save();showToast('予約しました')}
function openFriend(eid){const e=ev(eid);const me=currentUser();const fr=state.friends.filter(f=>f.ownerId===me.id);const html=`<div class="card sheet"><h2>友達も予約</h2><p class="muted small">タップで追加。未登録の友達はマイページで先に登録してください。</p><div class="people">${fr.map(f=>{const taken=e.bookings.some(b=>b.phone===f.phone);return `<button class="atrow" ${taken?'disabled':''} onclick="addFriendBook('${eid}','${f.phone}')"><span class="check">${taken?'✓':'＋'}</span>👤 ${f.nick}</button>`}).join('')}</div></div>`;document.getElementById('view').insertAdjacentHTML('beforeend',html);window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}
function addFriendBook(eid,phone){const e=ev(eid);if(e.bookings.length>=e.capacity)return showToast('満員です');if(e.bookings.some(b=>b.phone===phone))return showToast('予約済みです');const f=state.friends.find(x=>x.phone===phone)||{};e.bookings.push({phone:f.phone,nick:f.nick,icon:'👤'});save();showToast(`${f.nick}さんを追加しました`)}
function cancelBook(eid){const e=ev(eid);const me=currentUser();e.bookings=e.bookings.filter(b=>b.phone!==me.phone);if(e.waitlist&&e.waitlist.length){const nx=e.waitlist.shift();e.bookings.push(nx);showToast(`${nx.nick}さんが繰り上がりました`)}else{showToast('キャンセルしました')}save()}
function waitBook(eid){const e=ev(eid);const me=currentUser();e.waitlist=e.waitlist||[];if(e.waitlist.some(w=>w.phone===me.phone)||e.bookings.some(b=>b.phone===me.phone))return showToast('登録済みです');e.waitlist.push({phone:me.phone,nick:me.nick,icon:me.icon,userId:me.id});save();showToast('キャンセル待ちに登録しました')}

/* ===== survey (participant vote) ===== */
function surveyCard(e){const me=currentUser();if(roleOf(me)!=='participant')return '';if(!e.bookings.some(b=>b.phone===me.phone))return '';const targets=e.bookings.filter(p=>roleOf(p)==='participant'&&p.phone!==me.phone);if(!targets.length)return '';const already=(state.votes||[]).filter(v=>v.eventId===e.id&&v.voterPhone===me.phone).map(v=>v.targetPhone);
  return `<div class="card"><h2>練習後アンケート</h2><p class="muted small">よかった人を3人までタップ。スタッフ・管理者は対象外です。</p><div class="atlist">${targets.map(p=>`<button class="atrow ${already.includes(p.phone)?'on':''}" onclick="toggleVote('${e.id}','${p.phone}')"><span class="check">${already.includes(p.phone)?'✓':''}</span>${personRow(p)}</button>`).join('')}</div><div style="margin-top:8px"><span class="pill ${already.length===3?'blue':'warn'}">${already.length}/3 選択</span></div></div>`}
function toggleVote(eid,phone){const me=currentUser();if(roleOf(me)!=='participant')return;const t=userByPhone(phone);if(roleOf(t)!=='participant')return;const e=ev(eid);state.votes=state.votes||[];let mine=state.votes.filter(v=>v.eventId===eid&&v.voterPhone===me.phone);if(mine.some(v=>v.targetPhone===phone)){state.votes=state.votes.filter(v=>!(v.eventId===eid&&v.voterPhone===me.phone&&v.targetPhone===phone));save();return}if(mine.length>=3)return showToast('3人までです');state.votes.push({eventId:eid,date:e.date,voterPhone:me.phone,targetPhone:phone,createdAt:new Date().toISOString()});save()}

function renderMypage(){const u=currentUser();const nxt=nextRingInfo(votePoints(u.phone));const myT=(state.tickets||[]).filter(t=>t.userId===u.id);
  return `
  <div class="card"><div class="prow big">${personRow({phone:u.phone,nick:u.nick,icon:u.icon})}</div>
    <div class="sline" style="margin-top:10px">${roleOf(u)==='participant'?(nxt.remain?`もうすぐ <b>${nxt.next}リング</b>`:'最高ランク：ゴールドリング'):'管理者・スタッフは固定リングです'}</div></div>
  <div class="card"><h2>写真・絵文字</h2>
    <label class="filebtn"><span class="material-symbols-rounded">photo_camera</span>写真を選ぶ<input type="file" accept="image/*" onchange="setImage(event)" hidden></label>
    ${u.image?`<button class="ghost" onclick="clearImage()">写真を削除</button>`:''}
    <div class="field"><label>名前の前の絵文字</label><div class="emojipick">${ICON_KEYS.map(k=>`<button class="emo ${u.icon===k?'sel':''}" onclick="uSet('icon','${k}')"><img src="${ICONS[k]}" alt=""></button>`).join('')}</div></div></div>
  <div class="card"><h2>プロフィール</h2>
    <div class="field"><label>ニックネーム</label><input value="${u.nick}" onchange="uSet('nick',this.value)"></div>
    <div class="field"><label>名前</label><input value="${u.name}" onchange="uSet('name',this.value)"></div>
    <div class="field"><label>電話番号</label><input value="${u.phone}" onchange="uSet('phone',this.value)"></div>
    <div class="field"><label>生年月日</label><input type="date" value="${u.birth||''}" onchange="uSet('birth',this.value)"></div></div>
  <div class="card"><h2>電子チケット</h2>${myT.length?myT.map(t=>`<div class="ticket ${t.used?'used':''}"><b>${t.title}</b><span class="muted small">${t.used?'使用済み':'未使用'}</span>${t.used?'':`<button class="pink" onclick="useTicket('${t.id}')">使う</button>`}</div>`).join(''):'<div class="muted small">チケットはありません</div>'}</div>
  <div class="card"><h2>友達登録</h2><div class="field"><input id="fNick" placeholder="ニックネーム"></div><div class="field"><input id="fPhone" placeholder="電話番号"></div><button class="big" onclick="addFriend()">友達を追加</button>
    <div class="people">${state.friends.filter(f=>f.ownerId===u.id).map(f=>`<div class="prow plain">👤 ${f.nick}・${f.phone}</div>`).join('')||'<div class="muted small">まだいません</div>'}</div></div>
  <div class="card"><h2>デモ表示切替</h2><p class="muted small">本番では不要。役割ごとの画面を確認できます。</p>
    <div class="seg">${state.users.map(x=>`<button class="${x.id===u.id?'on':''}" onclick="switchUser('${x.id}')">${x.nick}<small>${roleLabel(x)}</small></button>`).join('')}</div>
    <button class="ghost" style="margin-top:10px" onclick="resetAll()">デモデータを初期化</button></div>`}
function uSet(k,v){currentUser()[k]=v;save()}
function setImage(ev){const f=ev.target.files&&ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{currentUser().image=rd.result;save();showToast('アイコン写真を設定しました')};rd.readAsDataURL(f)}
function clearImage(){currentUser().image='';save();showToast('写真を削除しました')}
function useTicket(id){const t=state.tickets.find(x=>x.id===id);t.used=true;t.usedAt=new Date().toLocaleString('ja-JP');save();showToast('チケットを使用しました')}
function addFriend(){const nick=document.getElementById('fNick').value.trim(),phone=document.getElementById('fPhone').value.trim();if(!nick||!phone)return showToast('ニックネームと電話番号を入力');if(state.users.some(u=>u.phone===phone)||state.friends.some(f=>f.phone===phone&&f.ownerId===currentUserId))return showToast('電話番号が重複しています');state.friends.push({ownerId:currentUserId,nick,phone});save();showToast('友達を追加しました')}
function switchUser(id){currentUserId=id;currentTab='mypage';save()}
function resetAll(){localStorage.removeItem(LS);state=defaultState();migrate();currentUserId=state.users[0].id;currentTab='reserve';selectedDate=today();attendDate=today();createDates=[];save();showToast('初期化しました')}

/* ===== staff ===== */
function renderStaff(){if(!['staff','admin'].includes(roleOf(currentUser())))return denied();return `<div class="subtabs"><button class="${staffView==='create'?'on':''}" onclick="setStaffView('create')">イベント作成</button><button class="${staffView==='attend'?'on':''}" onclick="setStaffView('attend')">出欠確認</button></div>${staffView==='create'?staffCreate():staffAttend()}`}
function setStaffView(v){staffView=v;render()}
function staffCreate(){const pl=state.settings.places||[];return `
  <div class="card"><h2>イベントを作成</h2>
    <div class="field"><label>競技</label><select id="cSport">${sports.map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="field"><label>時間</label><input id="cTime" value="20:00-22:00" oninput="updateLine()"></div>
    <div class="field"><label>場所</label><select id="cPlace" onchange="updateLine()">${pl.length?pl.map(p=>`<option>${p.name}</option>`).join(''):'<option>（管理者が場所を未登録）</option>'}</select></div>
    <div class="field"><label>定員</label><input id="cCap" type="number" value="12" oninput="updateLine()"></div>
    <div id="lineBox" class="sline"></div></div>
  <div class="card"><h2>開催日を選ぶ</h2><p class="muted small">同じ場所・時間・競技の日をタップ（複数OK）→ まとめて作成。</p>
    <div class="calendar">${monthDays().map(d=>d?`<button type="button" class="day ${byDate(d).length?'has':''} ${createDates.includes(d)?'picked':''}" onclick="toggleCreate('${d}',this)"><b>${Number(d.slice(8))}</b></button>`:'<i></i>').join('')}</div>
    <div class="between" style="margin-top:12px"><span class="pill" id="cCount">選択 ${createDates.length}日</span><button onclick="bulkCreate()">まとめて作成</button></div></div>`}
function updateLine(){const box=document.getElementById('lineBox');if(!box)return;const place=document.getElementById('cPlace').value;const time=document.getElementById('cTime').value;const hrs=hoursOf(time);const venue=placePerHour(place)*hrs;const labor=(+state.settings.laborPerHour||0)*hrs;const fee=(+state.settings.fee||0);const cap=+document.getElementById('cCap').value||0;const cost=venue+labor;const line=Math.ceil(cost/Math.max(fee,1));const over=line>cap;box.innerHTML=`<div class="money"${over?' style="color:var(--warn)"':''}>サスティナブルライン：${line}人</div>`}
function toggleCreate(d,el){const i=createDates.indexOf(d);if(i>=0){createDates.splice(i,1);el.classList.remove('picked')}else{createDates.push(d);el.classList.add('picked')}const c=document.getElementById('cCount');if(c)c.textContent=`選択 ${createDates.length}日`}
function bulkCreate(){if(!createDates.length)return showToast('カレンダーで開催日を選んでください');const sport=document.getElementById('cSport').value,time=document.getElementById('cTime').value,place=document.getElementById('cPlace').value,cap=+document.getElementById('cCap').value||0;const dates=[...createDates].sort();dates.forEach(date=>state.events.push({id:uid(),date,sport,time,place,capacity:cap,bookings:[],waitlist:[],attendedPhones:[]}));const n=dates.length;selectedDate=dates[0];attendDate=dates[0];createDates=[];showToast(`${n}件のイベントを作成しました`);save()}
function pickAttend(d){attendDate=d;render()}
function staffAttend(){const evs=byDate(attendDate);return `
  <div class="card"><h2>出欠確認</h2><p class="muted small">イベントのある日（色付き）をタップ → 参加した人をタップで「参加」に。</p>${calendarPick(attendDate,'pickAttend')}</div>
  <div class="muted small center">${fmtDate(attendDate)} のイベント</div>
  ${evs.length?evs.map(attendCard).join(''):'<div class="card muted center">この日はイベントがありません</div>'}`}
function attendCard(e){const att=e.attendedPhones||[];return `<div class="card"><div class="between"><h2>${sportEmoji(e.sport)} ${e.sport}</h2><span class="pill ${att.length?'blue':''}">${att.length}/${e.bookings.length} 参加</span></div>
  <div class="muted">${e.time}・${e.place}</div>
  <div class="atlist">${e.bookings.map(p=>`<button class="atrow ${att.includes(p.phone)?'on':''}" onclick="toggleAttend('${e.id}','${p.phone}')"><span class="check">${att.includes(p.phone)?'✓':''}</span>${personRow(p)}</button>`).join('')||'<div class="muted small">予約者がいません</div>'}</div>
  ${e.bookings.length?`<button class="ghost" onclick="finalizeAttend('${e.id}')">未タップを無断キャンセルとして記録</button>`:''}</div>`}
function toggleAttend(eid,phone){const e=ev(eid);e.attendedPhones=e.attendedPhones||[];e.attendedPhones=e.attendedPhones.includes(phone)?e.attendedPhones.filter(x=>x!==phone):[...e.attendedPhones,phone];save()}
function finalizeAttend(eid){const e=ev(eid);e.bookings.forEach(p=>{if(!(e.attendedPhones||[]).includes(p.phone))state.penalties.push({phone:p.phone,date:e.date,eventId:e.id})});save();showToast('記録しました')}

/* ===== admin ===== */
function renderAdmin(){if(roleOf(currentUser())!=='admin')return denied();return `${adminSettings()}
  <div class="card"><h2>無料チケット発行</h2><div class="row"><select id="tUser">${state.users.map(u=>`<option value="${u.id}">${u.nick}</option>`).join('')}</select><button onclick="issueTicket(document.getElementById('tUser').value)">発行</button></div></div>
  <div class="card"><h2>イベントの収支</h2><p class="muted small">サスティナブルライン＝黒字に必要な人数。</p>${state.events.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(adminEventRow).join('')||'<div class="muted small">イベントがありません</div>'}</div>
  ${voteLogs()}${ringLegend()}`}
function adminSettings(){const s=state.settings;return `<div class="card"><h2>場所と料金の設定</h2><p class="muted small">ここで決めた金額を、スタッフが作るイベントに自動で使います。</p>
  <h3>場所ごとの場所代（1時間あたり）</h3>
  <div class="places">${(s.places||[]).map((p,i)=>`<div class="placerow"><input value="${p.name}" onchange="setPlace(${i},'name',this.value)"><div class="amt"><input type="number" value="${p.perHour}" onchange="setPlace(${i},'perHour',this.value)"><span>円/時</span></div><button class="del" onclick="delPlace(${i})">×</button></div>`).join('')}</div>
  <div class="placerow add"><input id="npName" placeholder="新しい場所名"><div class="amt"><input id="npCost" type="number" placeholder="2500"><span>円/時</span></div><button onclick="addPlace()">＋</button></div>
  <h3 style="margin-top:14px">人件費（1時間あたり）</h3><div class="amt"><input type="number" value="${s.laborPerHour}" onchange="setSetting('laborPerHour',this.value)"><span>円/時</span></div>
  <h3 style="margin-top:14px">参加費（1人あたり）</h3><div class="amt"><input type="number" value="${s.fee}" onchange="setSetting('fee',this.value)"><span>円/人</span></div></div>`}
function setPlace(i,k,v){state.settings.places[i][k]=(k==='perHour'?(+v||0):v);save()}
function delPlace(i){state.settings.places.splice(i,1);save();showToast('場所を削除しました')}
function addPlace(){const n=document.getElementById('npName').value.trim();const c=+document.getElementById('npCost').value||0;if(!n)return showToast('場所名を入れてください');state.settings.places.push({name:n,perHour:c});save();showToast('場所を追加しました')}
function setSetting(k,v){state.settings[k]=+v||0;save()}
function adminEventRow(e){const c=econ(e);return `<div class="erow"><div><b>${fmtDate(e.date)} ${e.sport}</b><div class="muted small">${e.time}・${e.place}・${c.hrs}時間</div></div><div class="eright"><span class="pill">サスティナブル ${c.line}人</span><span class="pill ${e.bookings.length>=c.line?'blue':'danger'}">${e.bookings.length}人 ${yen(c.balance)}</span></div></div>`}
function issueTicket(userId){state.tickets=state.tickets||[];state.tickets.push({id:uid(),userId,title:'無料参加チケット',used:false,issuedAt:today()});save();showToast('無料チケットを発行しました')}
function voteLogs(){const logs=(state.votes||[]).slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));return `<div class="card"><h2>投票ログ（管理者のみ）</h2><div class="people">${logs.map(v=>{const e=ev(v.eventId)||{};return `<div class="prow plain">${fmtDate(e.date||v.date)} ${e.sport||''}：${userByPhone(v.voterPhone).nick||v.voterPhone} → ${userByPhone(v.targetPhone).nick||v.targetPhone}</div>`}).join('')||'<div class="muted small">まだありません</div>'}</div></div>`}
function ringLegend(){return `<div class="card"><h2>リングの色</h2><div class="legend"><div><span class="ringMini ring-black"><span class="inner">🌱</span></span>管理者</div><div><span class="ringMini ring-purple"><span class="inner">🌱</span></span>スタッフ</div><div><span class="ringMini ring-white"><span class="inner">👤</span></span>参加者（標準）</div><div><span class="ringMini ring-blue"><span class="inner">👤</span></span>ブルー</div><div><span class="ringMini ring-green"><span class="inner">👤</span></span>グリーン</div><div><span class="ringMini ring-red"><span class="inner">👤</span></span>レッド</div><div><span class="ringMini ring-gold"><span class="inner">👤</span></span>ゴールド</div></div></div>`}

/* ===== analytics ===== */
function renderAnalytics(){if(roleOf(currentUser())!=='admin')return denied();const a={};state.events.forEach(e=>{const mo=e.date.slice(0,7);a[mo]=a[mo]||{total:0};a[mo].total+=e.bookings.length});const max=Math.max(1,...Object.values(a).map(x=>x.total));const bySport={};state.events.forEach(e=>bySport[e.sport]=(bySport[e.sport]||0)+e.bookings.length);const maxS=Math.max(1,...Object.values(bySport));const phones=[...new Set((state.votes||[]).map(v=>v.targetPhone))];const rank=phones.map(p=>({p,pts:votePoints(p),u:userByPhone(p)})).sort((x,y)=>y.pts-x.pts);
  return `<div class="card"><h2>貢献ポイント</h2>${rank.length?rank.map(r=>`<div class="erow"><span>${personRow({phone:r.p,nick:r.u.nick||r.p,icon:r.u.icon})}</span><b>${r.pts}pt</b></div>`).join(''):'<div class="muted small">まだ投票がありません</div>'}</div>
  <div class="card"><h2>月別 参加者</h2>${Object.entries(a).map(([m,v])=>`<div class="bstat"><div class="between"><b>${m}</b><span>${v.total}人</span></div><div class="bar"><span style="width:${v.total/max*100}%"></span></div></div>`).join('')||'<div class="muted small">データなし</div>'}</div>
  <div class="card"><h2>競技別 参加者</h2>${Object.entries(bySport).map(([s,v])=>`<div class="bstat"><div class="between"><b>${sportEmoji(s)} ${s}</b><span>${v}人</span></div><div class="bar"><span style="width:${v/maxS*100}%"></span></div></div>`).join('')}</div>`}

/* ===== render ===== */
function render(){const me=currentUser();const rb=document.getElementById('roleBadge');if(rb){const role=roleOf(me);rb.textContent=`${roleLabel(me)}モード`;rb.className='rolebadge r-'+role}document.getElementById('nav').innerHTML=renderNav();const fn={reserve:renderReserve,mypage:renderMypage,staff:renderStaff,admin:renderAdmin,analytics:renderAnalytics}[currentTab]||renderReserve;document.getElementById('view').innerHTML=fn();if(currentTab==='staff'&&staffView==='create'){try{updateLine()}catch(e){}}}
render();
</script>
</body>
</html>
