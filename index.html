<style>
:root{--green:#22a06b;--orange:#ff9f43;--pink:#ff6b9a;--bg:#f7faf8;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--card:#fff;--red:#ef4444;--blue:#3b82f6}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink)}header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:12px 14px calc(10px + env(safe-area-inset-top))}h1{font-size:20px;margin:0;color:var(--green)}.sub{font-size:12px;color:var(--muted);margin-top:3px}main{padding:14px;max-width:980px;margin:0 auto 76px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 4px;font-size:13px;font-weight:700}.tab.active{background:var(--green);color:#fff;border-color:var(--green)}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 4px 14px rgba(31,41,55,.05)}h2{font-size:18px;margin:0 0 10px}h3{font-size:15px;margin:12px 0 8px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:10px;align-items:center}.muted{color:var(--muted);font-size:13px}.small{font-size:12px}.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 9px;background:#eef8f2;color:#16764d;font-size:12px;font-weight:700}.danger{background:#fff1f2;color:#be123c}.warn{background:#fff7ed;color:#c2410c}.blue{background:#eff6ff;color:#1d4ed8}button{appearance:none;border:0;border-radius:13px;padding:11px 13px;font-weight:800;background:var(--green);color:white;font-size:14px}button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}button.orange{background:var(--orange)}button.pink{background:var(--pink)}button.red{background:var(--red)}button:disabled{opacity:.45}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px;background:#fff;font-size:16px}label{font-size:12px;color:var(--muted);font-weight:700}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.field{margin:9px 0}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:54px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:6px;font-size:12px}.day.has{border-color:var(--green);background:#f0fbf5}.day.selected{outline:3px solid rgba(34,160,107,.25)}.dot{width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block;margin-right:2px}.avatar{width:34px;height:34px;border-radius:50%;background:#eef8f2;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;font-size:18px;border:1px solid var(--line)}.avatar img{width:100%;height:100%;object-fit:cover}.ringMini{width:34px;height:34px;border-radius:50%;padding:3px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:5px;background:#fff}.ringMini .inner{width:100%;height:100%;border-radius:50%;background:#eef8f2;display:inline-flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}.ring-white{border:2px solid #f8fafc;box-shadow:0 0 0 1px #d1d5db}.ring-blue{border:2px solid #3b82f6}.ring-green{border:2px solid #22a06b}.ring-red{border:2px solid #ef4444}.ring-gold{border:2px solid #f59e0b;box-shadow:0 0 10px rgba(245,158,11,.35)}.ring-purple{border:2px solid #8b5cf6;box-shadow:0 0 8px rgba(139,92,246,.25)}.ring-black{border:2px solid #111827;box-shadow:0 0 0 1px #111827}.voteBtn.selected{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}.checked{background:#e8f8ef;border-color:#9bd6b8}.bar{height:12px;background:#eef2f7;border-radius:99px;overflow:hidden}.bar>span{display:block;height:100%;background:var(--green);border-radius:99px}.stat{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}.money{font-size:22px;font-weight:900}.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.toast{position:fixed;left:14px;right:14px;bottom:88px;background:#111827;color:#fff;padding:12px;border-radius:14px;z-index:50;text-align:center;display:none}.toast.show{display:block}@media(min-width:760px){.layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tabs{grid-template-columns:repeat(4,160px)}}
</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
:root{--green:#71C846;--orange:#F5A03D;--orange-d:#E5882E;--pink:#D6188C;--bg:#fbf6f2;--ink:#241a16;--muted:#9a8d84;--line:#f0e7e0;--card:#ffffff;--red:#ef4444;--blue:#3b82f6;--grad:linear-gradient(135deg,#F5A03D 0%,#D6188C 100%)}
*{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#fbf6f2;background-image:radial-gradient(1200px 480px at 100% -8%,rgba(245,160,61,.16),transparent),radial-gradient(900px 420px at -10% 0,rgba(214,24,140,.12),transparent);background-attachment:fixed}
h1,h2,h3,.money{font-family:'Zen Maru Gothic','Zen Kaku Gothic New',sans-serif}
header{background:var(--grad);border-bottom:0;border-radius:0 0 28px 28px;box-shadow:0 10px 30px rgba(214,24,140,.20);padding:16px 18px calc(16px + env(safe-area-inset-top))}
header h1{color:#fff;font-weight:900;letter-spacing:.4px}
header .sub{color:rgba(255,255,255,.92)}
.tabs{gap:8px}
.tab{background:#fff;border:1.5px solid var(--line);border-radius:999px;font-weight:800;color:var(--ink);box-shadow:0 3px 10px rgba(36,26,22,.05);transition:.15s}
.tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(214,24,140,.30);transform:translateY(-1px)}
.card{border-radius:24px;border:1px solid var(--line);box-shadow:0 14px 34px rgba(36,26,22,.07)}
h2{font-weight:900}
button{background:var(--grad);border-radius:14px;font-weight:800;box-shadow:0 8px 18px rgba(214,24,140,.22)}
button.secondary{background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}
button.orange{background:linear-gradient(135deg,#F5A03D,#E5882E)}
button.pink{background:linear-gradient(135deg,#ff7aab,#D6188C)}
button.red{background:linear-gradient(135deg,#fb7185,#ef4444)}
input,select,textarea{border-radius:14px;border:1.5px solid var(--line)}
.pill{background:#fff2e6;color:#c2570f;border:1px solid #ffe0c6;font-weight:800}
.pill.danger{background:#ffe8ec;color:#be123c;border-color:#ffd2da}
.pill.warn{background:#fff2e0;color:#b45309;border-color:#ffe2bf}
.pill.blue{background:#e8f0ff;color:#1d4ed8;border-color:#d4e2ff}
.day{border-radius:14px}
.day.has{border-color:var(--orange);background:#fff6ec}
.day.selected{outline:3px solid rgba(245,160,61,.4)}
.day.picked{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 14px rgba(214,24,140,.28)}
.day.picked b{color:#fff}
.dot{background:var(--pink)}
.ringMini{width:42px;height:42px;padding:3px}
.ringMini .inner{background:#fff1e6;font-size:19px}
.emoji-badge{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:50%;background:#fff;border:1px solid var(--line);font-size:15px;margin:0 5px 0 4px;vertical-align:middle;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.p-name{font-weight:800;vertical-align:middle}
.role-tag{margin-left:2px}
.bar{height:13px;background:#f3ece6}
.bar>span{background:var(--grad)}
.money{color:var(--pink);font-weight:900}
.footer{background:rgba(255,255,255,.85);backdrop-filter:saturate(1.4) blur(12px);border-top:1px solid var(--line)}
.toast{border-radius:16px}
.avatar{background:#fff1e6}
.stat{border-radius:16px}
.item{border-radius:16px}
</style>

<body>
<header><h1>🌱 sowers 予約システム</h1><div class="sub">iPhone確認用・HTML単体プロトタイプ</div></header>
<main><div class="tabs"><button class="tab active" data-tab="reserve">予約</button><button class="tab" data-tab="mypage">マイページ</button><button class="tab" data-tab="admin">管理者</button><button class="tab" data-tab="analytics">分析</button></div><section id="reserve"></section><section id="mypage" hidden></section><section id="admin" hidden></section><section id="analytics" hidden></section></main>
<div class="footer"><button class="secondary" onclick="seedMore()">試算データ追加</button><button class="secondary" onclick="resetAll()">初期化</button></div><div id="toast" class="toast"></div>
<script>
const LS='sowers_reservation_v4';const sports=['バレー','バスケ','バドミントン','フットサル','卓球','ドッジボール','体操'];let state=load()||defaultState();let selectedDate=state.events[0]?.date||today();let currentUserId=state.users[0].id;let adminDates=[];
function today(){return new Date().toISOString().slice(0,10)}function yen(n){return '¥'+Number(n||0).toLocaleString('ja-JP')}function uid(){return Math.random().toString(36).slice(2,10)}function load(){try{return JSON.parse(localStorage.getItem(LS))}catch(e){return null}}function save(){localStorage.setItem(LS,JSON.stringify(state));render()}function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
function defaultState(){const d=new Date();const y=d.getFullYear(),m=d.getMonth();const date=(add)=>new Date(y,m,d.getDate()+add).toISOString().slice(0,10);return{users:[{id:'u1',name:'木原 敬太',phone:'09011112222',nick:'けい',icon:'👨',role:'admin',ig:'k.k_1012',url:'https://sowers.jp',image:'',birth:'1989-10-12'},{id:'u2',name:'山田 太郎',phone:'09033334444',nick:'たろう',icon:'👨',role:'participant',ig:'',url:'',image:'',birth:'1995-06-01'},{id:'u3',name:'佐藤 花子',phone:'09055556666',nick:'はな',icon:'👩',role:'staff',ig:'',url:'',image:'',birth:'1998-03-03'}],friends:[{ownerId:'u1',nick:'しょう',phone:'09077778888'},{ownerId:'u1',nick:'まい',phone:'09099990000'}],events:[{id:'e1',date:date(1),sport:'バレー',time:'20:00-22:00',place:'沖洲インドアパーク',capacity:4,venueCost:5000,laborCost:3000,fee:500,pr:'',bookings:[{phone:'09011112222',nick:'けい',icon:'👨',userId:'u1'},{phone:'09033334444',nick:'たろう',icon:'👨',userId:'u2'},{phone:'09055556666',nick:'はな',icon:'👩',userId:'u3'}],waitlist:[],attendedPhones:[]},{id:'e2',date:date(3),sport:'バスケ',time:'20:00-22:00',place:'徳島市立体育館',capacity:12,venueCost:6600,laborCost:4000,fee:500,pr:'',bookings:[],waitlist:[],attendedPhones:[]},{id:'e3',date:date(7),sport:'バドミントン',time:'19:30-21:30',place:'スポセン',capacity:18,venueCost:7000,laborCost:3000,fee:500,pr:'',bookings:[],waitlist:[],attendedPhones:[]}],penalties:[],votes:[],tickets:[{id:'t1',userId:'u1',title:'無料参加チケット',used:false,issuedAt:today()}]}}
function userByPhone(phone){return state.users.find(u=>u.phone===phone)||{}}function currentUser(){return state.users.find(u=>u.id===currentUserId)}function roleOf(p){const u=userByPhone(p.phone)||p;return u.role||p.role||'participant'}function votePoints(phone){return (state.votes||[]).filter(v=>v.targetPhone===phone).length}function nextRingInfo(points){if(points<21)return {next:'ブルー',remain:21-points,range:'0〜20'};if(points<51)return {next:'グリーン',remain:51-points,range:'21〜50'};if(points<76)return {next:'レッド',remain:76-points,range:'51〜75'};if(points<101)return {next:'ゴールド',remain:101-points,range:'76〜100'};return {next:'最高ランク',remain:0,range:'101〜'}}function ringClassFor(p){const r=roleOf(p);if(r==='admin')return 'ring-black';if(r==='staff')return 'ring-purple';const pts=votePoints(p.phone);if(pts>=101)return 'ring-gold';if(pts>=76)return 'ring-red';if(pts>=51)return 'ring-green';if(pts>=21)return 'ring-blue';return 'ring-white'}function personIcon(p){const u=userByPhone(p.phone);const r=roleOf(p);if(r==='admin'||r==='staff')return '🌱';return p.icon||u.icon||'👤'}function roleLabel(p){const r=roleOf(p);return r==='admin'?'管理者':r==='staff'?'スタッフ':'参加者'}function birthdayCake(p){const u=userByPhone(p.phone);if(!u.birth)return '';return Number(u.birth.slice(5,7))===new Date().getMonth()+1?'🎂':''}function avatarInner(p){const u=userByPhone(p.phone)||{};const img=u.image||p.image||'';if(img)return `<img src="${img}" alt="">`;const r=roleOf(p);return (r==='admin'||r==='staff')?'🌱':'👤'}
function ringPerson(p){return `<span class="ringMini ${ringClassFor(p)}"><span class="inner">${avatarInner(p)}</span></span><span class="emoji-badge">${personIcon(p)}</span><span class="p-name">${p.nick||userByPhone(p.phone).nick||p.phone}${birthdayCake(p)}</span> <span class="muted small role-tag">${roleLabel(p)}</span>`}
function monthDays(){const now=new Date();const y=now.getFullYear(),m=now.getMonth();const first=new Date(y,m,1);const days=new Date(y,m+1,0).getDate();let arr=[];for(let i=0;i<first.getDay();i++)arr.push(null);for(let day=1;day<=days;day++)arr.push(new Date(y,m,day).toISOString().slice(0,10));return arr}function byDate(d){return state.events.filter(e=>e.date===d)}
function renderReserve(){const events=byDate(selectedDate);return `<div class="card"><h2>イベントカレンダー</h2><div class="calendar">${monthDays().map(d=>d?`<button class="day ${byDate(d).length?'has':''} ${d===selectedDate?'selected':''}" onclick="selectedDate='${d}';render()"><b>${Number(d.slice(8))}</b><br>${byDate(d).map(()=>'<span class=dot></span>').join('')}</button>`:'<div></div>').join('')}</div></div><div class="layout"><div>${events.map(eventCard).join('')||'<div class="card muted">この日はイベントがありません</div>'}</div><div>${events.map(surveyCard).join('')}</div></div>`}
function eventCard(e){const booked=e.bookings.some(b=>b.userId===currentUserId);const full=e.bookings.length>=e.capacity;return `<div class="card"><div class="between"><h2>${e.sport}</h2><span class="pill">${e.bookings.length}/${e.capacity}</span></div><div class="muted">${e.date} ${e.time}<br>${e.place}</div>${e.pr?`<div class="item warn">PR：${e.pr}</div>`:''}<h3>参加予定</h3><div class="list">${e.bookings.map(p=>`<div class="item">${ringPerson(p)}</div>`).join('')||'<div class="muted">まだ参加者なし</div>'}</div><div class="row" style="margin-top:10px">${booked?`<button class="red" onclick="cancelBook('${e.id}')">キャンセル</button>`:full?`<button class="orange" onclick="waitBook('${e.id}')">キャンセル待ち</button>`:`<button onclick="openBook('${e.id}')">参加予約</button>`}</div></div>`}
function openBook(eid){const me=currentUser();const fr=state.friends.filter(f=>f.ownerId===currentUserId);const html=`<div class="card"><h2>予約者を選択</h2><div class="muted small">本人含め最大3人まで。電話番号重複は受付不可。</div><div class="list" style="margin-top:10px"><label class="item"><input type="checkbox" class="bookChk" value="me" checked> 自分：${me.nick}</label>${fr.map((f,i)=>`<label class="item"><input type="checkbox" class="bookChk" value="${i}"> ${f.nick}</label>`).join('')}</div><button onclick="confirmBook('${eid}')">予約する</button></div>`;document.getElementById('reserve').insertAdjacentHTML('afterbegin',html)}
function confirmBook(eid){const e=state.events.find(x=>x.id===eid);const me=currentUser();const fr=state.friends.filter(f=>f.ownerId===currentUserId);const vals=[...document.querySelectorAll('.bookChk:checked')].map(x=>x.value);if(vals.length>3)return showToast('本人含め最大3人までです');const people=vals.map(v=>v==='me'?{phone:me.phone,nick:me.nick,icon:me.icon,userId:me.id}:fr[+v]);const phones=people.map(p=>p.phone);if(new Set(phones).size!==phones.length)return showToast('同じ電話番号は登録できません');if(phones.some(ph=>e.bookings.some(b=>b.phone===ph)||e.waitlist.some(w=>w.phone===ph)))return showToast('すでに同じ電話番号で予約があります');if(e.bookings.length+people.length>e.capacity)return showToast('定員を超えます。キャンセル待ちにしてください');e.bookings.push(...people);save();showToast('予約しました')}
function cancelBook(eid){const e=state.events.find(x=>x.id===eid);const me=currentUser();e.bookings=e.bookings.filter(b=>b.phone!==me.phone);if(e.waitlist.length){const next=e.waitlist.shift();e.bookings.push(next);showToast(`${next.nick}さんがキャンセル待ちから繰り上がりました。12時間以内の参加確定通知想定です`)}save()}function waitBook(eid){const e=state.events.find(x=>x.id===eid);const me=currentUser();if(e.waitlist.some(w=>w.phone===me.phone)||e.bookings.some(b=>b.phone===me.phone))return showToast('すでに登録済みです');e.waitlist.push({phone:me.phone,nick:me.nick,icon:me.icon,userId:me.id,waitingAt:new Date().toISOString()});save();showToast('キャンセル待ちに登録しました')}
function surveyCard(e){if(!e.bookings.length)return '';const me=currentUser();if(roleOf(me)!=='participant')return `<div class="card"><h2>練習後アンケート</h2><div class="muted">管理者・スタッフは投票できません。</div></div>`;const targets=e.bookings.filter(p=>roleOf(p)==='participant'&&p.phone!==me.phone);const already=(state.votes||[]).filter(v=>v.eventId===e.id&&v.voterPhone===me.phone).map(v=>v.targetPhone);return `<div class="card"><h2>練習後10秒アンケート</h2><div class="muted small">サークルを良くしてくれた人を3人選んでください。スタッフ・管理者は投票対象外です。同じ人は1日1回だけです。</div><div class="list" style="margin-top:10px">${targets.map(p=>`<button class="secondary voteBtn ${already.includes(p.phone)?'selected':''}" onclick="toggleVote('${e.id}','${p.phone}')">${ringPerson(p)}</button>`).join('')||'<div class="muted">選べる参加者がいません</div>'}</div><div class="row" style="margin-top:10px"><span class="pill ${already.length===3?'blue':'warn'}">${already.length}/3人選択</span></div></div>`}
function toggleVote(eid,targetPhone){state.votes=state.votes||[];const me=currentUser();if(roleOf(me)!=='participant')return showToast('管理者・スタッフは投票できません');const target=userByPhone(targetPhone);if(roleOf(target)!=='participant')return showToast('管理者・スタッフは選べません');const e=state.events.find(x=>x.id===eid);if(!e.bookings.some(p=>p.phone===targetPhone))return;let mine=state.votes.filter(v=>v.eventId===eid&&v.voterPhone===me.phone);if(mine.some(v=>v.targetPhone===targetPhone)){state.votes=state.votes.filter(v=>!(v.eventId===eid&&v.voterPhone===me.phone&&v.targetPhone===targetPhone));showToast('選択を外しました');save();return}if(mine.length>=3)return showToast('1日で選べるのは3人までです');state.votes.push({eventId:eid,date:e.date,voterPhone:me.phone,targetPhone,createdAt:new Date().toISOString()});save();if(mine.length+1===3)showToast('アンケートを保存しました')}
function renderMypage(){const u=currentUser();const pts=votePoints(u.phone);const nxt=nextRingInfo(pts);const myTickets=(state.tickets||[]).filter(t=>t.userId===u.id);return `<div class="card"><h2>表示確認</h2><div class="item">${ringPerson({phone:u.phone,nick:u.nick,icon:u.icon})}</div><div class="stat"><b>次のリングまで</b><br>${roleOf(u)==='participant'?(nxt.remain?`${nxt.next}リングまであと少し`:'最高ランク：ゴールドリング'):'管理者・スタッフは固定リングです'}</div></div><div class="card"><h2>プロフィール</h2><div class="field"><label>表示ユーザー切替</label><select onchange="currentUserId=this.value;save()">${state.users.map(x=>`<option value="${x.id}" ${x.id===u.id?'selected':''}>${x.nick}（${roleLabel(x)}）</option>`).join('')}</select></div><div class="grid2"><div class="field"><label>名前</label><input value="${u.name}" onchange="uSet('name',this.value)"></div><div class="field"><label>ニックネーム</label><input value="${u.nick}" onchange="uSet('nick',this.value)"></div><div class="field"><label>電話番号</label><input value="${u.phone}" onchange="uSet('phone',this.value)"></div><div class="field"><label>生年月日</label><input type="date" value="${u.birth||''}" onchange="uSet('birth',this.value)"></div><div class="field"><label>Instagram</label><input value="${u.ig||''}" onchange="uSet('ig',this.value)"></div><div class="field"><label>事業URL</label><input value="${u.url||''}" onchange="uSet('url',this.value)"></div><div class="field"><label>区分</label><select onchange="uSet('role',this.value)"><option value="participant" ${u.role==='participant'?'selected':''}>参加者</option><option value="staff" ${u.role==='staff'?'selected':''}>スタッフ</option><option value="admin" ${u.role==='admin'?'selected':''}>管理者</option></select></div><div class="field"><label>絵文字（名前の前）</label><select onchange="uSet('icon',this.value)">${['👦','👨','👴','👧','👩','👵'].map(i=>`<option ${u.icon===i?'selected':''}>${i}</option>`).join('')}</select></div><div class="field"><label>アイコン画像（丸の中）</label><input type="file" accept="image/*" onchange="setImage(event)">${u.image?`<div class="small muted" style="margin-top:6px">画像を設定済み <button class="secondary" style="padding:6px 10px;font-size:12px;margin-left:6px" onclick="clearImage()">削除</button></div>`:''}</div></div></div><div class="card"><h2>電子チケット</h2><div class="list">${myTickets.map(t=>`<div class="item ${t.used?'danger':''}"><b>${t.title}</b><br>${t.used?'使用済み：'+t.usedAt:'未使用'}<br>${!t.used?`<button class="pink" onpointerup="useTicket('${t.id}')">スタッフに見せて斜めスワイプ使用</button>`:''}</div>`).join('')||'<div class="muted">チケットなし</div>'}</div></div><div class="card"><h2>友達登録</h2><div class="grid2"><input id="fNick" placeholder="友達ニックネーム"><input id="fPhone" placeholder="友達電話番号"></div><button onclick="addFriend()">友達追加</button><div class="list" style="margin-top:10px">${state.friends.filter(f=>f.ownerId===u.id).map(f=>`<div class="item">${f.nick} / ${f.phone}</div>`).join('')}</div></div>`}
function uSet(k,v){currentUser()[k]=v;save()}function setImage(ev){const f=ev.target.files&&ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{currentUser().image=rd.result;save();showToast('アイコン画像を設定しました')};rd.readAsDataURL(f)}function clearImage(){currentUser().image='';save();showToast('画像を削除しました')}function addFriend(){const nick=fNick.value.trim(),phone=fPhone.value.trim();if(!nick||!phone)return showToast('ニックネームと電話番号を入力');if(state.users.some(u=>u.phone===phone)||state.friends.some(f=>f.phone===phone&&f.ownerId===currentUserId))return showToast('電話番号が重複しています');state.friends.push({ownerId:currentUserId,nick,phone});save();showToast('友達を追加しました')}function useTicket(id){const t=state.tickets.find(x=>x.id===id);t.used=true;t.usedAt=new Date().toLocaleString('ja-JP');save();showToast('チケットを使用済みにしました')}
function adminCreate(){return `<div class="card"><h2>イベント作成・採算計算</h2><div class="grid2"><div class="field"><label>種目</label><select id="adSport">${sports.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="field"><label>時間</label><input id="adTime" value="20:00-22:00"></div><div class="field"><label>場所</label><input id="adPlace" value="沖洲インドアパーク"></div><div class="field"><label>定員</label><input id="adCap" type="number" value="20" oninput="calcBreakEven()"></div><div class="field"><label>1人参加費</label><input id="adFee" type="number" value="500" oninput="calcBreakEven()"></div><div class="field"><label>場所代</label><input id="adVenue" type="number" value="5000" oninput="calcBreakEven()"></div><div class="field"><label>人件費</label><input id="adLabor" type="number" value="3000" oninput="calcBreakEven()"></div></div><div id="breakEvenBox" class="stat"></div><div class="field"><label>将来の課金PR枠サンプル</label><textarea id="adPr" placeholder="課金者の事業URL・商品PR文を掲載できる枠"></textarea></div><h3>開催日を選ぶ（タップで複数選択OK）</h3><div class="muted small" style="margin-bottom:8px">同じ施設・時間・競技の日をまとめてタップ → 一括作成できます。</div><div class="calendar">${monthDays().map(d=>d?`<button type="button" class="day ${byDate(d).length?'has':''} ${adminDates.includes(d)?'picked':''}" onclick="toggleAdminDate('${d}',this)"><b>${Number(d.slice(8))}</b></button>`:'<div></div>').join('')}</div><div class="row" style="margin-top:12px"><span class="pill" id="adCount">選択中：${adminDates.length}日</span><button onclick="createBulkEvents()">選んだ日にまとめて作成</button></div></div>`}
function calcBreakEven(){setTimeout(()=>{if(!window.adVenue)return;const cost=+adVenue.value + +adLabor.value;const fee=Math.max(+adFee.value,1);const line=Math.ceil(cost/fee);const cap=+adCap.value;breakEvenBox.innerHTML=`<div class="money">赤字回避ライン：${line}人</div><div class="muted">場所代＋人件費 ${yen(cost)} ÷ 参加費 ${yen(fee)}</div><div class="pill ${line>cap?'danger':'blue'}">${line>cap?'定員内では赤字回避不可':'定員内で黒字化可能'}</div>`},0)}function toggleAdminDate(d,el){const i=adminDates.indexOf(d);if(i>=0){adminDates.splice(i,1);el.classList.remove('picked')}else{adminDates.push(d);el.classList.add('picked')}const c=document.getElementById('adCount');if(c)c.textContent=`選択中：${adminDates.length}日`}
function createBulkEvents(){if(!adminDates.length)return showToast('カレンダーで開催日を選んでください');const sport=adSport.value,time=adTime.value,place=adPlace.value,cap=+adCap.value,venue=+adVenue.value,labor=+adLabor.value,fee=+adFee.value,pr=adPr.value;const dates=[...adminDates].sort();dates.forEach(date=>{state.events.push({id:uid(),date,sport,time,place,capacity:cap,venueCost:venue,laborCost:labor,fee,pr,bookings:[],waitlist:[],attendedPhones:[]})});const n=dates.length;selectedDate=dates[0];adminDates=[];save();showToast(`${n}件のイベントを作成しました（${place}・${time}・${sport}）`)}
function adminEvent(e){const cost=e.venueCost+e.laborCost;const line=Math.ceil(cost/Math.max(e.fee,1));return `<div class="card"><div class="between"><h2>${e.date} ${e.sport}</h2><span class="pill">${e.bookings.length}/${e.capacity}</span></div><div class="muted">${e.time} / ${e.place}</div><div class="row"><span class="pill">赤字回避 ${line}人</span><span class="pill ${e.bookings.length>=line?'blue':'danger'}">現在収支 ${yen(e.bookings.length*e.fee-cost)}</span></div><h3>出欠確認：来た人だけタップ</h3><div class="list">${e.bookings.map(p=>`<button class="secondary ${e.attendedPhones.includes(p.phone)?'checked':''}" onclick="toggleAttend('${e.id}','${p.phone}')">${ringPerson(p)}</button>`).join('')||'<div class="muted">参加者なし</div>'}</div><button class="red" style="margin-top:8px" onclick="finalizeAttend('${e.id}')">未タップを無断キャンセルにする</button></div>`}function toggleAttend(eid,phone){const e=state.events.find(x=>x.id===eid);e.attendedPhones=e.attendedPhones||[];e.attendedPhones=e.attendedPhones.includes(phone)?e.attendedPhones.filter(p=>p!==phone):[...e.attendedPhones,phone];save()}function finalizeAttend(eid){const e=state.events.find(x=>x.id===eid);e.bookings.forEach(p=>{if(!e.attendedPhones.includes(p.phone))state.penalties.push({phone:p.phone,date:e.date,eventId:e.id})});save();showToast('未タップを無断キャンセルとして記録しました')}function issueTicket(uid){state.tickets=state.tickets||[];state.tickets.push({id:uid(),userId:uid,title:'無料参加チケット',used:false,issuedAt:today()});save();showToast('無料チケットを発行しました')}
function adminVoteLogs(){const logs=(state.votes||[]).slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));return `<div class="card"><h2>管理者だけ見える投票ログ</h2><div class="muted small">誰が誰を選んだかは管理者側だけで確認します。</div><div class="list" style="margin-top:10px">${logs.map(v=>{const voter=userByPhone(v.voterPhone);const target=userByPhone(v.targetPhone);const ev=state.events.find(e=>e.id===v.eventId)||{};return `<div class="item"><b>${ev.date||''} ${ev.sport||''}</b><br>${voter.nick||v.voterPhone} → ${target.nick||v.targetPhone}</div>`}).join('')||'<div class="muted">まだ投票ログがありません</div>'}</div></div>`}function ringLegend(){return `<div class="card"><h2>リング色ルール</h2><div class="list"><div class="item"><span class="ringMini ring-black"><span class="inner">🌱</span></span>管理者：ブラックリング</div><div class="item"><span class="ringMini ring-purple"><span class="inner">🌱</span></span>スタッフ：ムラサキリング</div><div class="item"><span class="ringMini ring-white"><span class="inner">👨</span></span>0〜20pt：ホワイト</div><div class="item"><span class="ringMini ring-blue"><span class="inner">👨</span></span>21〜50pt：ブルー</div><div class="item"><span class="ringMini ring-green"><span class="inner">👨</span></span>51〜75pt：グリーン</div><div class="item"><span class="ringMini ring-red"><span class="inner">👨</span></span>76〜100pt：レッド</div><div class="item"><span class="ringMini ring-gold"><span class="inner">👨</span></span>101pt以上：ゴールド</div></div></div>`}
function renderAdmin(){return `${adminCreate()}<div class="card"><h2>無料チケット発行</h2><select id="ticketUser">${state.users.map(u=>`<option value="${u.id}">${u.nick}</option>`).join('')}</select><button onclick="issueTicket(ticketUser.value)">発行</button></div>${state.events.map(adminEvent).join('')}${adminVoteLogs()}${ringLegend()}`}
function analytics(){const months={};state.events.forEach(e=>{const mo=e.date.slice(0,7);months[mo]=months[mo]||{total:0,sports:{}};months[mo].total+=e.bookings.length;months[mo].sports[e.sport]=(months[mo].sports[e.sport]||0)+e.bookings.length});return months}function renderAnalytics(){const a=analytics();const max=Math.max(1,...Object.values(a).map(x=>x.total));const bySport={};state.events.forEach(e=>bySport[e.sport]=(bySport[e.sport]||0)+e.bookings.length);const maxS=Math.max(1,...Object.values(bySport));const phones=[...new Set((state.votes||[]).map(v=>v.targetPhone))];const ranking=phones.map(phone=>({phone,points:votePoints(phone),user:userByPhone(phone)})).sort((a,b)=>b.points-a.points);return `<div class="card"><h2>サークル貢献ポイント</h2>${ranking.map(r=>`<div class="stat between"><span>${ringPerson({phone:r.phone,nick:r.user.nick||r.phone,icon:r.user.icon})}</span><b>${r.points}pt</b></div>`).join('')||'<div class="muted">まだ投票がありません</div>'}</div><div class="card"><h2>月別 参加者推移</h2>${Object.entries(a).map(([m,v])=>`<div class="stat"><div class="between"><b>${m}</b><span>${v.total}人</span></div><div class="bar"><span style="width:${v.total/max*100}%"></span></div></div>`).join('')||'<div class="muted">データなし</div>'}</div><div class="card"><h2>スポーツ別 参加者数</h2>${Object.entries(bySport).map(([s,v])=>`<div class="stat"><div class="between"><b>${s}</b><span>${v}人</span></div><div class="bar"><span style="width:${v/maxS*100}%"></span></div></div>`).join('')}</div>`}
function seedMore(){const base=new Date();for(let i=1;i<=8;i++){const date=new Date(base.getFullYear(),base.getMonth()-Math.floor(i/3),Math.max(1,4*i)).toISOString().slice(0,10);const sport=sports[i%sports.length];state.events.push({id:uid(),date,sport,time:'20:00-22:00',place:'サンプル会場',capacity:24,venueCost:5000,laborCost:3000,fee:500,pr:'',bookings:Array.from({length:8+i},(_,j)=>({phone:'080'+i+j,nick:`参加者${i}-${j+1}`,icon:j%2?'👨':'👩'})),waitlist:[],attendedPhones:[]})}save();showToast('分析用サンプルを追加しました')}function resetAll(){localStorage.removeItem(LS);state=defaultState();selectedDate=state.events[0].date;currentUserId=state.users[0].id;save();showToast('初期化しました')}
function switchTab(tab){document.querySelectorAll('section').forEach(s=>s.hidden=s.id!==tab);document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));function render(){document.getElementById('reserve').innerHTML=renderReserve();document.getElementById('mypage').innerHTML=renderMypage();document.getElementById('admin').innerHTML=renderAdmin();document.getElementById('analytics').innerHTML=renderAnalytics();try{calcBreakEven()}catch(e){}}render();
</script>
</body>
</html>
